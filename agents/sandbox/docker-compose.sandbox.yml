version: '3.8'

services:
  brain-sandbox:
    build:
      context: ..
      dockerfile: sandbox/Dockerfile

    # Resource limits for safety
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
        reservations:
          memory: 256M
          cpus: '0.5'

    # Read-only brain mounts
    volumes:
      - ../../engineering_brain:/brains/engineering_brain:ro
      - ../../design_brain:/brains/design_brain:ro
      - ../../mba_brain:/brains/mba_brain:ro
      - ../../ceo_brain:/brains/ceo_brain:ro
      - ../../options_trading_brain:/brains/options_trading_brain:ro
      # Read-write work directory
      - sandbox-work:/home/sandbox/work

    # Environment
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - SUPABASE_URL=${SUPABASE_URL:-}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY:-}
      - BRAINS_ROOT=/brains

    # Network isolation (disable by default)
    networks:
      - sandbox-net

    # Security options
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:size=100M

networks:
  sandbox-net:
    driver: bridge
    internal: true  # No external network access by default

volumes:
  sandbox-work:
